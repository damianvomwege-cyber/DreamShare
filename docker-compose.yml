services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dreamshare
    ports:
      - "5432:5432"
    volumes:
      - dreamshare-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dreamshare"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "replace-with-a-strong-secret"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/dreamshare?schema=public"
      DEFAULT_ADMIN_USERNAME: "DreamShare"
      DEFAULT_ADMIN_EMAIL: "owner@example.com"
      DEFAULT_ADMIN_DISPLAY_NAME: "DreamShare Owner"
      DEFAULT_ADMIN_PASSWORD: ""
    ports:
      - "3000:3000"

volumes:
  dreamshare-postgres:
